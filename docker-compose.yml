services:
  bot:
    user: "1000:1000"
    build: .
    env_file: .env
    environment:
      REDIS_HOST: redis
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./db/data:/app/db/data
      - ./assets:/app/assets:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
